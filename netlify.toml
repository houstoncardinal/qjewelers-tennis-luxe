[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  # These env vars have values that intentionally appear in source code as fallbacks or
  # public-facing content (site URL, email addresses, analytics IDs). None are secrets.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SITE_URL,RESEND_FROM_EMAIL,VITE_SUPABASE_URL,VITE_SUPABASE_PROJECT_ID,VITE_SUPABASE_PUBLISHABLE_KEY,VITE_GA4_ID,VITE_META_PIXEL_ID,VITE_TIKTOK_PIXEL_ID,SUPABASE_URL"

# All requests go through the SSR edge function.
# Static assets (.js, .css, images, fonts) are passed through to Netlify CDN
# by the function itself via context.next().
[[edge_functions]]
  path = "/*"
  function = "ssr"
